global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default
  routes:
    - match:
        severity: critical
      receiver: critical
      repeat_interval: 1h

receivers:
  - name: default
    webhook_configs:
      - url: "${ALERTMANAGER_WEBHOOK_URL:-http://localhost:9095/webhook}"
        send_resolved: true
    # Uncomment to enable email notifications:
    # email_configs:
    #   - to: "${ALERT_EMAIL_TO}"
    #     from: "${ALERT_EMAIL_FROM}"
    #     smarthost: "${ALERT_SMTP_HOST}:${ALERT_SMTP_PORT}"
    #     auth_username: "${ALERT_SMTP_USER}"
    #     auth_password: "${ALERT_SMTP_PASSWORD}"
    #     require_tls: true

  - name: critical
    webhook_configs:
      - url: "${ALERTMANAGER_WEBHOOK_URL:-http://localhost:9095/webhook}"
        send_resolved: true
    # Uncomment to enable email notifications for critical alerts:
    # email_configs:
    #   - to: "${ALERT_EMAIL_TO}"
    #     from: "${ALERT_EMAIL_FROM}"
    #     smarthost: "${ALERT_SMTP_HOST}:${ALERT_SMTP_PORT}"
    #     auth_username: "${ALERT_SMTP_USER}"
    #     auth_password: "${ALERT_SMTP_PASSWORD}"
    #     require_tls: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "instance"]
