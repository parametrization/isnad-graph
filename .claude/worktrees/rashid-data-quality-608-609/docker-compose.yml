services:
  neo4j:
    image: neo4j:5.26.23-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/isnad_graph_dev
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - isnad-net
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:0.8.2-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: isnad_graph
      POSTGRES_USER: isnad
      POSTGRES_PASSWORD: isnad_dev
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isnad"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - isnad-net
    restart: unless-stopped

  redis:
    image: redis:7.4.2-alpine
    ports:
      - "6379:6379"
    networks:
      - isnad-net
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=isnad_graph_dev
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - isnad-net
    command: uv run uvicorn src.api.app:create_app --factory --host 0.0.0.0 --port 8000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    networks:
      - isnad-net
    restart: unless-stopped

networks:
  isnad-net:
    driver: bridge

volumes:
  neo4j_data:
  pg_data:
