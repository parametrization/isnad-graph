services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/isnad_graph_dev
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
    volumes:
      - neo4j_data:/data
    networks:
      - isnad-net
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: isnad_graph
      POSTGRES_USER: isnad
      POSTGRES_PASSWORD: isnad_dev
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isnad"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - isnad-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - isnad-net
    restart: unless-stopped

networks:
  isnad-net:
    driver: bridge

volumes:
  neo4j_data:
  pg_data:
