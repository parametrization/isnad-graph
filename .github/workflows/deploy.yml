name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hetzner VPS
        uses: appleboy/ssh-action@v1
        env:
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          AUTH_GOOGLE_CLIENT_ID: ${{ secrets.AUTH_GOOGLE_CLIENT_ID }}
          AUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.AUTH_GOOGLE_CLIENT_SECRET }}
          AUTH_GITHUB_CLIENT_ID: ${{ secrets.AUTH_GITHUB_CLIENT_ID }}
          AUTH_GITHUB_CLIENT_SECRET: ${{ secrets.AUTH_GITHUB_CLIENT_SECRET }}
        with:
          host: ${{ vars.VPS_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          envs: NEO4J_PASSWORD,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,REDIS_PASSWORD,AUTH_GOOGLE_CLIENT_ID,AUTH_GOOGLE_CLIENT_SECRET,AUTH_GITHUB_CLIENT_ID,AUTH_GITHUB_CLIENT_SECRET
          script: |
            set -euo pipefail
            cd /opt/isnad-graph

            echo "==> Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "==> Writing .env for docker-compose..."
            cat > .env <<DOTENV
NEO4J_PASSWORD=$NEO4J_PASSWORD
POSTGRES_USER=$POSTGRES_USER
POSTGRES_PASSWORD=$POSTGRES_PASSWORD
POSTGRES_DB=$POSTGRES_DB
REDIS_PASSWORD=$REDIS_PASSWORD
AUTH_GOOGLE_CLIENT_ID=$AUTH_GOOGLE_CLIENT_ID
AUTH_GOOGLE_CLIENT_SECRET=$AUTH_GOOGLE_CLIENT_SECRET
AUTH_GITHUB_CLIENT_ID=$AUTH_GITHUB_CLIENT_ID
AUTH_GITHUB_CLIENT_SECRET=$AUTH_GITHUB_CLIENT_SECRET
CACHEBUST=$(date +%s)
DOTENV
            chmod 600 .env

            echo "==> Building and starting services..."
            echo "==> Pulling GHCR image for API (falls back to local build)..."
            docker compose -f docker-compose.prod.yml pull api 2>/dev/null || echo "GHCR pull failed — will build locally"

            docker compose -f docker-compose.prod.yml --env-file .env up -d --build --force-recreate --remove-orphans

            echo "==> Waiting for services to stabilize..."
            sleep 15

      - name: Verify health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.VPS_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            echo "==> Checking service health via Docker..."
            for i in $(seq 1 24); do
              api_health=$(docker inspect --format='{{.State.Health.Status}}' isnad-graph-api-1 2>/dev/null || echo "not_found")
              echo "Attempt $i/24: API=$api_health"
              if [ "$api_health" = "healthy" ]; then
                echo "API health check passed"
                break
              fi
              if [ "$i" -eq 24 ]; then
                echo "ERROR: API health check failed after 120 seconds"
                docker compose -f /opt/isnad-graph/docker-compose.prod.yml logs --tail=50 api
                exit 1
              fi
              sleep 5
            done

            echo "==> Checking all container health..."
            docker compose -f /opt/isnad-graph/docker-compose.prod.yml ps --format '{{.Name}}\t{{.Status}}'

            echo "==> Deployment verified successfully"

      - name: Report deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "::notice::Deployment to production succeeded"
          else
            echo "::error::Deployment to production failed"
          fi
          echo "## Deployment Status: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Triggered by:** ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
